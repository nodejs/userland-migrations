version: "1"
nodes:
  - id: apply-transforms
    name: Apply AST Transformations
    type: automatic
    runtime:
      type: direct
    steps:
      - name: "Replace `assert` import attribute to the `with` ECMAScript import attribute."
        js-ast-grep:
          js_file: "srx/workflow.ts"
          base_path: "."
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"
          language: "typescript"
