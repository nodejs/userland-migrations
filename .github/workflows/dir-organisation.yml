# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# For more information see: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow

name: Code Quality

on:
  pull_request:
    branches: ["*"]
    paths:
      - ".github/workflows/dir-organisation.yml"
      - "recipes/**/tests/**"
    types:
      - edited
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  forbid-junkdrawer-tests:
    name: Test organisation
    runs-on: ubuntu-slim

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Check for junkdrawer
        run: >
          junkdrawer=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- **/test/input/** **/test/expected/**)

          if [[ -n "$junkdrawer" ]]; then
            echo "❌ do not use junk-drawer tests directories; create a folder per test-case with an 'input' and an 'expected' file. Errant files:\n"
            echo "$junkdrawer"
            exit 1
          fi
