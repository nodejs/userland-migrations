# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# For more information see: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/running-variations-of-jobs-in-a-workflow

name: Quality Assurance

on:
  push:
    branches: ["*"]
    paths:
      - "recipes/**/*.js"
      - "recipes/**/*.ts"
      - "recipes/**/package.json"
      - "utils/**/*.js"
      - "utils/**/*.ts"
      - "utils/package.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "recipes/**/*.js"
      - "recipes/**/*.ts"
      - "recipes/**/package.json"
      - "utils/**/*.js"
      - "utils/**/*.ts"
      - "utils/**/package.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  get-matrix:
    name: Configure Node environment matrix
    runs-on: ubuntu-latest

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    outputs:
      latest: ${{ steps.set-matrix.outputs.requireds }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: ljharb/actions/node/matrix@7f214d8efdbdcefc96ad9689663ef387a195deec # main
        id: set-matrix
        with:
          versionsAsRoot: true
          type: majors
          preset: ">= 22" # glob is not backported below 22.x

  lint-and-types:
    name: Lint & types
    runs-on: ubuntu-slim

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    steps:
      # FIXME https://github.com/step-security/harden-runner/issues/627
      # - name: Harden the runner (Audit all outbound calls)
      #   uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      #   with:
      #     egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - run: npm ci
      - run: node --run lint
      - run: node --run type-check

  test:
    name: Codemod JSSG tests
    runs-on: ${{ matrix.os }}

    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: "npm"
          check-latest: true
          node-version-file: ".nvmrc"

      - run: npm ci

      - run: >
          npm run test $(
            git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }}
            | grep '^recipes/'
            | cut -d/ -f1,2
            | sort -u
            | sed 's/^/--workspace=/'
          )
